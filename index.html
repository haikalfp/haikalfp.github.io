<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drillhole Assay Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <h1>Drillhole Assay Viewer</h1>
        <div class="controls">
            <div class="file-input-wrapper">
                <button class="btn-file">📁 Load Excel Data</button>
                <input type="file" id="fileInput" accept=".xlsx, .xlsm">
            </div>
            <div class="selector-wrapper">
                <label for="holeSelect">Hole ID:</label>
                <select id="holeSelect" disabled>
                    <option value="">Select a Hole ID...</option>
                </select>
            </div>
            <div class="action-buttons">
                <button id="toggleAbove" class="btn-toggle" title="Toggle Mined Intervals">🌑 Dim Mined</button>
                <button id="showSummary" class="btn-summary" disabled>📊 Assay Summary</button>
                <button id="showOreCalc" class="btn-ore" disabled>⛏️ Ore Calculation</button>
                <button id="showDiagram" class="btn-diagram" disabled>📈 Show Diagram</button>
            </div>
        </div>
    </header>

    <!-- Modal for Assay Summary -->
    <div id="summaryModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Assay Summary Statistics</h2>
            <div class="summary-controls">
                <label class="switch-wrapper">
                    <input type="checkbox" id="availableOnly">
                    <span class="slider"></span>
                    <span class="label-text">Available Materials Only (Below Topo)</span>
                </label>
            </div>
            <div id="summaryStats">
                <!-- Summary tables will be injected here -->
            </div>
        </div>
    </div>

    <!-- Modal for Ore Calculation -->
    <div id="oreModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Remaining Ore Calculation</h2>
            <div class="summary-controls">
                <label class="switch-wrapper">
                    <input type="checkbox" id="oreAvailableOnly">
                    <span class="slider"></span>
                    <span class="label-text">Available Materials Only (Below Topo)</span>
                </label>
            </div>
            <div id="oreResults">
                <!-- Ore results will be injected here -->
            </div>
        </div>
    </div>

    <!-- Modal for Assay Diagram -->
    <div id="diagramModal" class="modal hidden">
        <div class="modal-content modal-large">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <h2 id="diagramTitle">Assay Diagram</h2>
                <div class="modal-actions">
                    <button id="toggleFullscreen" class="btn-action">📺 Fullscreen</button>
                    <button id="exportJPG" class="btn-action">💾 Export JPG</button>
                </div>
            </div>
            
            <div class="diagram-controls">
                <div class="control-group">
                    <label>Width:</label>
                    <input type="range" id="chartWidth" min="300" max="2000" value="600">
                    <span id="widthValue">600px</span>
                </div>
                <div class="control-group">
                    <label>Height:</label>
                    <input type="range" id="chartHeight" min="400" max="5000" value="800">
                    <span id="heightValue">800px</span>
                </div>
                <div class="control-group">
                    <label>Ni Max (%):</label>
                    <input type="number" id="niMax" step="0.5" value="3.5" style="width: 60px;">
                </div>
                <div class="control-group">
                    <label>Others Max (%):</label>
                    <input type="number" id="othersMax" step="5" value="70" style="width: 60px;">
                </div>
                <div class="control-group toggles">
                    <label><input type="checkbox" class="dataset-toggle" data-index="0" checked> Ni</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="1" checked> Fe</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="2" checked> MgO</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="3" checked> SiO2</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="4"> Co</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="5"> CaO</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="6"> Al2O3</label>
                    <label><input type="checkbox" class="dataset-toggle" data-index="7"> SiMa</label>
                </div>
            </div>

            <div class="chart-scroll-container">
                <div class="chart-container" id="chartWrapper" style="width: 600px;">
                    <canvas id="assayChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <main id="app" class="dim-mined">
        <div id="welcomeMessage" class="empty-state">
            <p>Please load an Excel file to begin viewing assay data.</p>
        </div>

        <div id="tableContainer" class="table-container hidden">
            <table id="assayTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Hole ID</th>
                        <th>LITHO</th>
                        <th>FROM</th>
                        <th>TO</th>
                        <th>Elev</th>
                        <th>Topo Position</th>
                        <th>Ni</th>
                        <th>Co</th>
                        <th>Fe</th>
                        <th>SiO2</th>
                        <th>CaO</th>
                        <th>MgO</th>
                        <th>Al2O3</th>
                        <th>SiMa</th>
                    </tr>
                </thead>
                <tbody id="assayBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
