<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drillhole Assay Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
    <header>
        <h1>Drillhole Assay Viewer</h1>
        <div class="controls">
            <div class="file-input-wrapper">
                <button class="btn-file">📁 Load Excel Data</button>
                <input type="file" id="fileInput" accept=".xlsx, .xlsm">
            </div>
            <div class="selector-wrapper">
                <label for="holeSelect">Hole ID:</label>
                <select id="holeSelect" disabled>
                    <option value="">Select a Hole ID...</option>
                </select>
            </div>
        </div>
    </header>

    <main id="app">
        <div id="welcomeMessage" class="empty-state">
            <p>Please load an Excel file to begin viewing assay data.</p>
        </div>

        <div id="tableContainer" class="table-container hidden">
            <table id="assayTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Hole ID</th>
                        <th>LITHO</th>
                        <th>FROM</th>
                        <th>TO</th>
                        <th>Elev</th>
                        <th>Topo Position</th>
                        <th>Ni</th>
                        <th>Co</th>
                        <th>Fe</th>
                        <th>SiO2</th>
                        <th>CaO</th>
                        <th>MgO</th>
                        <th>Al2O3</th>
                        <th>SiMa</th>
                    </tr>
                </thead>
                <tbody id="assayBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
